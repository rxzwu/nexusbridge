name: Build Worker Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      server_url:
        description: 'WebSocket server URL'
        required: false
        default: 'wss://bridge.example.com:8765'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact_name: nexusbridgehub-worker.exe
            asset_name: nexusbridgehub-worker-windows-amd64.exe
            shell: pwsh
          - os: macos-latest
            platform: macos
            artifact_name: nexusbridgehub-worker
            asset_name: nexusbridgehub-worker-macos-amd64
            shell: bash
          - os: ubuntu-20.04
            platform: linux
            artifact_name: nexusbridgehub-worker
            asset_name: nexusbridgehub-worker-linux-amd64
            shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install .[builder]

      - name: Verify installation
        run: |
          nexusbridgehub --help
          python -c "import nexusbridgehub; print(f'Version: {nexusbridgehub.__version__}')"

      - name: Build worker binary (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          SERVER_URL: ${{ github.event.inputs.server_url || secrets.BRIDGE_SERVER_URL || 'wss://bridge.example.com:8765' }}
        run: |
          nexusbridgehub --server-url "$env:SERVER_URL" --name nexusbridgehub-worker --output-dir ./build-output

      - name: Build worker binary (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        env:
          SERVER_URL: ${{ github.event.inputs.server_url || secrets.BRIDGE_SERVER_URL || 'wss://bridge.example.com:8765' }}
        run: |
          nexusbridgehub --server-url "$SERVER_URL" --name nexusbridgehub-worker --output-dir ./build-output

      - name: Test binary (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          & ./build-output/dist/${{ matrix.artifact_name }} --help

      - name: Test binary (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          chmod +x ./build-output/dist/${{ matrix.artifact_name }}
          ./build-output/dist/${{ matrix.artifact_name }} --help || true

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p ./artifacts
          cp ./build-output/dist/${{ matrix.artifact_name }} ./artifacts/${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ./artifacts/${{ matrix.asset_name }}
          retention-days: 90

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/${{ matrix.asset_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
